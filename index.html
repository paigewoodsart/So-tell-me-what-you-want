<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>So Tell Me What You Want: A Design Preference Profile by Paige Woods</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Crimson+Pro:wght@300;400&family=DM+Sans:wght@300;400;500&family=EB+Garamond:ital,wght@0,400;1,400&family=IM+Fell+English:ital@0;1&family=Inter:wght@300;400;500&family=Jost:wght@300;400;500&family=Lato:wght@300;400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;1,400&family=Nunito+Sans:wght@300;400&family=Oswald:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Raleway:wght@300;400;500&family=Source+Sans+3:wght@300;400&family=Source+Serif+4:wght@300;400&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111111;--surface:#1C1C1C;--border:#3A3A3A;--border-dark:#FFFFFF;
  --text:#F5F5F5;--text-mid:#C0C0C0;--text-light:#888888;
  --selected-bg:#252525;--radius:12px;--radius-sm:6px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100%}
@keyframes stepIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.step-animate{animation:stepIn 0.22s ease forwards}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 40px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;z-index:100;gap:16px}
.topbar-brand{}
.topbar-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:500;letter-spacing:0.01em}
.topbar-sub{font-size:10px;font-weight:500;color:var(--text-light);letter-spacing:0.09em;text-transform:uppercase;margin-top:1px}
.progress-wrap{display:flex;align-items:center;gap:14px}
.progress-label{font-size:12px;color:var(--text-mid);font-weight:300;white-space:nowrap}
.progress-track{width:160px;height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--text);border-radius:2px;transition:width 0.5s ease}
.progress-dots{display:flex;gap:5px;align-items:center}
.pdot{width:5px;height:5px;border-radius:50%;background:var(--border);transition:all 0.3s ease}
.pdot.done{background:var(--text)}
.pdot.active{background:var(--text);transform:scale(1.5)}

/* LAYOUT */
.app-body{display:grid;grid-template-columns:1fr 2fr;flex:1;min-height:0;overflow:hidden}

/* LEFT PANEL */
.step-panel{padding:40px 32px 80px;border-right:1px solid var(--border);overflow-y:auto;height:100%}
.step-eyebrow{font-size:10px;font-weight:400;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-light);margin-bottom:10px}
.step-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;line-height:1.2;letter-spacing:-0.01em;margin-bottom:10px}
.step-desc{font-size:13px;font-weight:400;color:var(--text-mid);line-height:1.7;margin-bottom:28px}

/* NAV BUTTONS */
.nav-row{display:flex;align-items:center;gap:10px;padding-top:4px}
.btn-next{display:inline-flex;align-items:center;gap:8px;padding:12px 26px;background:#FFFFFF;color:#111111;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;letter-spacing:0.03em;cursor:pointer;transition:opacity 0.15s}
.btn-next:hover{opacity:0.82}
.btn-back{display:inline-flex;align-items:center;gap:6px;padding:12px 18px;background:transparent;color:var(--text-mid);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;cursor:pointer;transition:all 0.15s}
.btn-back:hover{border-color:var(--text);color:var(--text)}

/* CHIPS */
.chip-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:32px}
.chip{padding:9px 17px;border:1px solid var(--border);border-radius:100px;font-size:13px;color:var(--text-mid);cursor:pointer;transition:all 0.15s;background:var(--surface);user-select:none}
.chip:hover{border-color:var(--text);color:var(--text)}
.chip.selected{background:#FFFFFF;border-color:#FFFFFF;color:#111111}

/* OPTION CARDS (layout/shape/border/motion/texture) */
.option-grid{display:grid;grid-template-columns:1fr;gap:9px;margin-bottom:32px}
.option-grid.two-col{grid-template-columns:1fr 1fr}
.option-card{padding:20px;border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all 0.15s;background:var(--surface);position:relative}
.option-card:hover{border-color:var(--text)}
.option-card.selected{border-color:var(--text);background:var(--selected-bg)}
.option-card.selected .ocheck{opacity:1}
.option-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:5px;padding-right:24px}
.option-desc{font-size:12px;font-weight:400;color:var(--text-mid);line-height:1.55}
.ocheck{position:absolute;top:14px;right:14px;width:18px;height:18px;border-radius:50%;background:#FFFFFF;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.15s;flex-shrink:0}
.ocheck::after{content:'';width:6px;height:4px;border-left:1.5px solid #111;border-bottom:1.5px solid #111;transform:rotate(-45deg) translateY(-1px);display:block}

/* CUSTOM COLOUR INPUTS */
.custom-color-rows{display:flex;flex-direction:column;gap:10px;margin-top:14px;border-top:1px solid var(--border);padding-top:14px}
.custom-color-row{display:flex;align-items:center;gap:10px}
.custom-color-row span{font-size:11px;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;color:var(--text-light);width:72px;flex-shrink:0}
.color-swatch-picker{width:34px;height:34px;padding:2px;border:1.5px solid var(--border);border-radius:5px;cursor:pointer;background:transparent;flex-shrink:0}
.color-swatch-picker::-webkit-color-swatch-wrapper{padding:0;border-radius:2px}
.color-swatch-picker::-webkit-color-swatch{border:none;border-radius:2px}
.hex-input{flex:1;padding:8px 10px;background:transparent;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:400;color:var(--text);letter-spacing:0.05em;outline:none;transition:border-color 0.15s}
.hex-input:focus{border-color:rgba(255,255,255,0.4)}
.custom-preview-strip{display:flex;height:18px;border-radius:3px;overflow:hidden;margin-top:12px}
.custom-preview-strip div{flex:1}

/* ANIMATION STYLES */
@keyframes photoDrift{0%{transform:scale(1.0) translate(0,0)}33%{transform:scale(1.05) translate(-6px,-3px)}66%{transform:scale(1.07) translate(4px,-6px)}100%{transform:scale(1.0) translate(0,0)}}
@keyframes photoReveal{from{opacity:0;transform:translateY(20px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes headReveal{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
.anim-hover .hero-fullbleed img,.anim-hover .polaroid-card img,.anim-hover .split-img-half img,.anim-hover .floating-img img,.anim-hover .framed-box img{transition:transform 0.6s ease}
.anim-hover .hero-fullbleed:hover img,.anim-hover .polaroid-card:hover img,.anim-hover .split-img-half:hover img,.anim-hover .floating-img:hover img,.anim-hover .framed-box:hover img{transform:scale(1.05)}
.anim-hover .hero-btn:hover{transform:translateY(-5px)!important;box-shadow:0 16px 44px rgba(0,0,0,0.32)!important}
.anim-reveal .hero-text{animation:headReveal 0.7s ease 0.1s both!important}
.anim-reveal .polaroid-wrap,.anim-reveal .split-img-half,.anim-reveal .floating-img,.anim-reveal .framed-wrap{animation:photoReveal 0.9s ease 0.3s both!important}
.anim-reveal .hero-fullbleed img{animation:photoReveal 1s ease 0.1s both!important}
.anim-reveal .hero-cta-row{animation:heroIn 0.6s ease 0.5s both!important}
.anim-kinetic .hero-fullbleed img,.anim-kinetic .polaroid-card img,.anim-kinetic .split-img-half img,.anim-kinetic .floating-img img,.anim-kinetic .framed-box img{animation:photoDrift 14s ease-in-out infinite;transform-origin:center center;overflow:hidden}
.anim-kinetic .hero-btn{overflow:hidden}
.anim-kinetic .hero-btn::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(255,255,255,0.22) 0%,transparent 65%);opacity:0;transform:scale(0.7);transition:opacity 0.45s ease,transform 0.45s ease}
.anim-kinetic .hero-btn:hover::before{opacity:1;transform:scale(1.3)}
.anim-kinetic .hero-btn:hover{transform:translateY(-6px)!important;box-shadow:0 20px 56px rgba(0,0,0,0.4)!important}

/* BRAND NAME INPUT */
.brand-name-field{margin-bottom:32px}
.brand-name-label{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-light);margin-bottom:10px;display:block}
.brand-name-input{width:100%;padding:14px 16px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:400;color:var(--text);outline:none;transition:border-color 0.15s;caret-color:var(--text)}
.brand-name-input::placeholder{color:var(--text-light)}
.brand-name-input:focus{border-color:rgba(255,255,255,0.5)}

/* RECOMMENDED INDICATORS */
.rec-badge{display:inline-block;font-size:9px;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;color:var(--text-light);border:1px solid var(--border);border-radius:100px;padding:2px 8px;margin-bottom:9px}
.chip.rec:not(.selected){border-color:rgba(255,255,255,0.32);color:var(--text)}
.rec-intro{font-size:11px;color:var(--text-light);font-style:italic;margin-bottom:18px;margin-top:-14px}

/* TYPOGRAPHY CARDS */
.typo-grid{display:grid;grid-template-columns:1fr;gap:9px;margin-bottom:32px}
.typo-card{padding:22px 18px 18px;border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all 0.15s;background:var(--surface);position:relative}
.typo-card:hover{border-color:var(--text)}
.typo-card.selected{border-color:var(--text);background:var(--selected-bg)}
.typo-card.selected .ocheck{opacity:1}
.typo-label{font-size:10px;font-weight:400;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-light);margin-bottom:10px}
.typo-head{font-size:19px;line-height:1.2;margin-bottom:7px;color:var(--text)}
.typo-body{font-size:11.5px;line-height:1.6;color:var(--text-mid);font-weight:400}
.typo-desc{font-size:10.5px;color:var(--text-light);margin-top:10px;font-style:italic;border-top:1px solid var(--border);padding-top:8px}

/* PALETTE CARDS */
.palette-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:32px}
.palette-card{padding:14px;border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all 0.15s;background:var(--surface);position:relative}
.palette-card:hover{border-color:var(--text)}
.palette-card.selected{border-color:var(--text);background:var(--selected-bg)}
.palette-card.selected .ocheck{opacity:1}
.palette-swatches{display:flex;height:26px;border-radius:5px;overflow:hidden;margin-bottom:9px}
.palette-swatch{flex:1}
.palette-name{font-size:13px;font-weight:500;color:var(--text)}
.palette-mood{font-size:11px;font-weight:300;color:var(--text-light);font-style:italic;margin-top:2px}

/* UPLOAD */
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:52px 28px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--surface);margin-bottom:14px;position:relative;overflow:hidden}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--text);background:var(--selected-bg)}
.upload-zone img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.upload-icon{width:44px;height:44px;border:1.5px dashed var(--text-light);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:18px;color:var(--text-light)}
.upload-title{font-size:14px;font-weight:400;color:var(--text);margin-bottom:5px}
.upload-hint{font-size:12px;font-weight:300;color:var(--text-light)}
.upload-skip{font-size:12px;font-weight:300;color:var(--text-light);text-align:center;cursor:pointer;text-decoration:underline;text-underline-offset:3px;display:block}
.upload-skip:hover{color:var(--text)}
.upload-remove{margin-top:12px;font-size:12px;color:var(--text-light);text-decoration:underline;cursor:pointer;display:none}
.upload-remove:hover{color:var(--text)}

/* WELCOME */
.welcome-wrap{max-width:600px}
.welcome-eyebrow{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-light);margin-bottom:18px}
.welcome-title{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:300;line-height:1.07;letter-spacing:-0.02em;margin-bottom:8px}
.welcome-title em{font-style:italic}
.welcome-sub{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:300;color:var(--text-mid);font-style:italic;margin-bottom:36px}
.welcome-body{font-size:14px;font-weight:400;color:var(--text-mid);line-height:1.8;max-width:460px;margin-bottom:10px}
.welcome-note{font-size:13px;font-weight:400;color:var(--text-light);font-style:italic;margin-bottom:44px}
.welcome-steps{padding:22px 24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;gap:9px;margin-bottom:44px}
.ws-item{display:flex;align-items:center;gap:13px;font-size:13px;color:var(--text-mid);font-weight:400}
.ws-num{width:21px;height:21px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text-light);flex-shrink:0}

/* REVIEW */
.review-grid{display:flex;flex-direction:column;gap:9px;margin-bottom:44px}
.review-card{display:flex;align-items:flex-start;justify-content:space-between;padding:16px 18px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);gap:14px}
.review-left{flex:1}
.review-cat{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-light);margin-bottom:3px}
.review-val{font-size:13px;color:var(--text);font-weight:400;line-height:1.4}
.review-edit{font-size:12px;color:var(--text-light);text-decoration:underline;text-underline-offset:3px;cursor:pointer;flex-shrink:0;padding-top:1px}
.review-edit:hover{color:var(--text)}

/* SUMMARY MODE — full takeover */
.app-body.summary-mode{grid-template-columns:1fr}
.app-body.summary-mode .canvas-panel{display:none}
.app-body.summary-mode .step-panel{padding:0;height:100%;overflow:hidden}

/* SUMMARY SCREEN */
.summary-screen{display:flex;flex-direction:column;height:100%}

/* TOP 75% — display */
.sd{flex:0 0 75%;min-height:0;display:flex;flex-direction:column;padding:0;overflow:hidden;background:var(--bg)}
.sd-header{padding:32px 48px 20px;flex-shrink:0;display:flex;align-items:flex-end;justify-content:space-between;gap:24px}
.sd-eyebrow{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-light);margin-bottom:6px}
.sd-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:400;color:var(--text);line-height:1.1}
.sd-voice-inline{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:var(--text-mid);max-width:400px;line-height:1.55;text-align:right}

/* HORIZONTAL CARDS ROW */
.sd-cards{flex:1;min-height:0;display:flex;gap:14px;padding:0 48px 28px;overflow-x:auto;overflow-y:hidden;scroll-behavior:smooth;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.sd-cards::-webkit-scrollbar{height:3px}
.sd-cards::-webkit-scrollbar-track{background:transparent}
.sd-cards::-webkit-scrollbar-thumb{background:#3A3A3A;border-radius:2px}

/* INDIVIDUAL CARD */
@keyframes cardSlideIn{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
.spc{flex:0 0 220px;height:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px 20px;display:flex;flex-direction:column;gap:10px;scroll-snap-align:start;cursor:default;
  opacity:0;animation:cardSlideIn 0.45s ease forwards;
  transition:transform 0.25s ease,border-color 0.25s ease,box-shadow 0.25s ease}
.spc:hover{transform:translateY(-6px);border-color:rgba(255,255,255,0.45);box-shadow:0 20px 56px rgba(0,0,0,0.7);z-index:2}
.spc:nth-child(1){animation-delay:0.04s}
.spc:nth-child(2){animation-delay:0.1s}
.spc:nth-child(3){animation-delay:0.16s}
.spc:nth-child(4){animation-delay:0.22s}
.spc:nth-child(5){animation-delay:0.28s}
.spc:nth-child(6){animation-delay:0.34s}
.spc:nth-child(7){animation-delay:0.4s}
.spc:nth-child(8){animation-delay:0.46s}
.spc:nth-child(9){animation-delay:0.52s}
.spc-cat{font-size:9px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-light)}
.spc-val{font-size:13px;font-weight:400;color:var(--text);line-height:1.45;flex:1}
.spc-detail{font-size:11px;font-weight:400;color:var(--text-mid);line-height:1.5;margin-top:auto}
.spc-swatches{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.spc-swatch{width:22px;height:22px;border-radius:4px;flex-shrink:0}
.spc-font-head{font-size:18px;line-height:1.2;color:var(--text);margin-top:4px}
.spc-font-body{font-size:11px;line-height:1.55;color:var(--text-mid);margin-top:6px}
.spc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.spc-tag{padding:2px 8px;border:1px solid var(--border);border-radius:100px;font-size:9px;letter-spacing:0.05em;color:var(--text-mid)}

/* HERO MOCKUP */
@keyframes heroIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.hero-mockup{width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;transition:background 0.5s ease}
.hero-nav{display:flex;align-items:center;justify-content:space-between;padding:22px 56px;flex-shrink:0}
.hero-nav-logo{font-size:17px;font-weight:500;letter-spacing:0.01em;transition:font-family 0.4s}
.hero-nav-links{display:flex;gap:36px;font-size:12px;opacity:0.55;letter-spacing:0.04em}
.hero-main{flex:1;min-height:0;display:flex;align-items:center;gap:56px;padding:0 56px 40px;overflow:hidden}
.hero-text{flex:1;min-width:0;animation:heroIn 0.5s ease 0.1s both}
.hero-eyebrow{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:20px;opacity:0.5}
.hero-headline{line-height:1.0;font-weight:400;margin-bottom:22px;transition:font-family 0.4s,color 0.4s}
.hero-body-copy{font-size:15px;line-height:1.75;max-width:460px;margin-bottom:36px;opacity:0.75;transition:font-family 0.4s}
.hero-cta-row{display:flex;align-items:center;gap:20px}
.hero-btn{display:inline-block;padding:14px 30px;font-size:13px;font-weight:500;cursor:default;letter-spacing:0.03em;transition:transform 0.22s ease,box-shadow 0.22s ease;position:relative;overflow:hidden}
.hero-btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0.12);opacity:0;transition:opacity 0.2s}
.hero-btn:hover::after{opacity:1}
.hero-btn:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(0,0,0,0.25)}
.hero-btn-ghost{font-size:13px;opacity:0.55;cursor:default;border-bottom:1px solid currentColor;padding-bottom:1px;transition:opacity 0.2s}
.hero-btn-ghost:hover{opacity:0.9}
.hero-photo-wrap{flex:0 0 38%;min-height:0;animation:heroIn 0.5s ease 0.2s both;overflow:hidden}
.hero-photo-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.hero-photo-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;opacity:0.25}

/* ── LAYOUT 1: FULL BLEED ── */
.hero-fullbleed{position:relative;overflow:hidden;flex:1;min-height:0}
.hero-fullbleed img,.hero-fullbleed .fb-gradient{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.hero-fullbleed .fb-scrim{position:absolute;inset:0;background:linear-gradient(to top, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.3) 55%, rgba(0,0,0,0.1) 100%)}
.hero-fullbleed .hero-text{position:relative;z-index:2;padding:40px 64px;display:flex;flex-direction:column;justify-content:flex-end;height:100%}
.hero-fullbleed .hero-text *{color:#FFFFFF!important}
.hero-fullbleed .hero-btn{border:1.5px solid rgba(255,255,255,0.6)!important}
.hero-fullbleed .hero-btn:hover{background:rgba(255,255,255,0.15)!important;border-color:#fff!important}

/* ── LAYOUT 2: POLAROID ── */
.hero-polaroid{flex:1;min-height:0;display:flex;align-items:center;gap:0}
.hero-polaroid .hero-text{flex:1;min-width:0;padding:40px 48px}
.polaroid-wrap{flex:0 0 auto;display:flex;align-items:center;justify-content:center;padding:0 48px 0 0}
.polaroid-card{background:#FFFFFF;padding:13px 13px 48px;box-shadow:0 16px 56px rgba(0,0,0,0.35),0 4px 16px rgba(0,0,0,0.2);transform:rotate(-2.5deg);transition:transform 0.3s ease,box-shadow 0.3s ease;width:230px;flex-shrink:0}

.polaroid-card img,.polaroid-card .polar-ph{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}
.polaroid-card .polar-ph{display:flex;align-items:center;justify-content:center;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#999;background:#f0f0f0}
.polaroid-caption{font-family:'DM Sans',sans-serif;font-size:11px;text-align:center;color:#888;margin-top:10px;letter-spacing:0.04em}

/* ── LAYOUT 3: CLEAN SPLIT ── */
.hero-split{flex:1;min-height:0;display:flex;overflow:hidden}
.hero-split .hero-text{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.split-img-half{flex:0 0 48%;overflow:hidden;position:relative}
.split-img-half img{width:100%;height:100%;object-fit:cover;display:block}
.split-img-half .split-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.35}
.split-divider{width:1px;flex-shrink:0;align-self:stretch}

/* ── LAYOUT 4: FLOATING OVERLAP ── */
.hero-floating{flex:1;min-height:0;position:relative;overflow:hidden;display:flex;align-items:center}
.hero-floating .hero-text{flex:1;min-width:0;padding:40px 52px;position:relative;z-index:1}
.floating-img{position:absolute;right:-20px;top:50%;transform:translateY(-52%) rotate(2.5deg);width:42%;z-index:2;border-radius:10px;overflow:hidden;box-shadow:0 24px 72px rgba(0,0,0,0.55),0 8px 24px rgba(0,0,0,0.3);transition:transform 0.35s ease}
.floating-img:hover{transform:translateY(-54%) rotate(1deg) scale(1.02)}
.floating-img img,.floating-img .float-ph{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}
.floating-img .float-ph{display:flex;align-items:center;justify-content:center;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.3}

/* ── LAYOUT 5: ARCHITECTURAL FRAME ── */
.hero-framed{flex:1;min-height:0;display:flex;align-items:center;gap:0}
.hero-framed .hero-text{flex:1;min-width:0;padding:40px 48px}
.framed-wrap{flex:0 0 auto;padding:0 52px 0 0;display:flex;align-items:center}
.framed-box{padding:10px;flex-shrink:0}
.framed-box img,.framed-box .frame-ph{width:260px;aspect-ratio:4/3;object-fit:cover;display:block}
.framed-box .frame-ph{display:flex;align-items:center;justify-content:center;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.3}

/* BOTTOM 25% — export bar (contrasting white) */
.se{flex:0 0 25%;min-height:0;background:#FFFFFF;display:flex;align-items:center;justify-content:space-between;padding:0 48px;gap:32px;border-top:1px solid #E0E0E0;margin-top:25px}
.se-left{flex:1;min-width:0}
.se-label{font-size:9px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#888;margin-bottom:6px}
.se-voice{font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;color:#1A1A1A;line-height:1.55;max-width:520px}
.se-actions{display:flex;gap:10px;flex-shrink:0;align-items:center}

/* EXPORT BAR BUTTONS (on white) */
.se-btn{display:inline-flex;align-items:center;gap:7px;padding:12px 22px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:all 0.2s ease;position:relative;overflow:hidden;letter-spacing:0.02em}
.se-btn::after{content:'';position:absolute;inset:0;background:currentColor;opacity:0;transition:opacity 0.2s ease}
.se-btn:hover::after{opacity:0.08}
.se-btn.primary{background:#111111;color:#FFFFFF;border-color:#111111}
.se-btn.primary:hover{background:#000;transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.3)}
.se-btn.secondary{background:transparent;color:#111111;border-color:#C0C0C0}
.se-btn.secondary:hover{border-color:#111111;transform:translateY(-2px)}
.se-btn.ghost{background:transparent;color:#888;border-color:transparent;padding-left:0;padding-right:0}
.se-btn.ghost:hover{color:#111111}
.copy-confirm{font-size:11px;color:#888;font-style:italic;white-space:nowrap}

/* RIGHT: CANVAS PANEL */
.canvas-panel{background:var(--bg);height:100%;overflow:hidden;display:flex;flex-direction:column;padding:0}
.canvas-top{flex:0 0 66.666%;min-height:0;overflow-y:auto;padding:40px 48px 20px;display:flex;flex-direction:column;gap:20px}
.canvas-bottom{flex:0 0 33.333%;min-height:0;overflow-y:auto;border-top:1px solid var(--border);padding:16px 48px 20px}
.canvas-section-label{font-size:10px;font-weight:400;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-light)}

/* CANVAS CARD */
.canvas-card{background:#FFFFFF;border:1px solid #2E2E2E;border-radius:var(--radius);overflow:hidden;transition:border-radius 0.4s ease,border 0.4s ease,box-shadow 0.4s ease}
.canvas-photo{width:100%;height:150px;background:#EDEAE4;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;transition:background 0.4s ease}
.canvas-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.canvas-photo-ph{display:flex;flex-direction:column;align-items:center;gap:7px;color:var(--text-light);pointer-events:none}
.canvas-photo-ph .icon{width:28px;height:28px;border:1.5px dashed var(--text-light);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px}
.canvas-photo-ph span{font-size:10px;font-weight:300;letter-spacing:0.05em}
.canvas-body{padding:18px;background:#FFFFFF;transition:background 0.4s ease,padding 0.4s ease}
.canvas-tone-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;min-height:22px}
.ctag{padding:2px 9px;border:1px solid #E0DDD8;border-radius:100px;font-size:9px;letter-spacing:0.06em;text-transform:uppercase;color:#888;transition:all 0.3s}
.ctag.on{background:#1A1A1A;border-color:#1A1A1A;color:#fff}
.canvas-headline{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;line-height:1.2;margin-bottom:6px;color:#1A1A1A;transition:font-family 0.3s,color 0.4s}
.canvas-tagline{font-size:11.5px;font-weight:300;color:#6A6460;margin-bottom:12px;line-height:1.6;transition:font-family 0.3s,color 0.4s}
.canvas-divider{height:1px;background:#E8E4DC;margin-bottom:12px;transition:all 0.4s}
.canvas-palette-strip{display:flex;height:12px;border-radius:3px;overflow:hidden;margin-bottom:12px}
.cps{flex:1;transition:background 0.4s}
.canvas-cta{display:inline-block;padding:7px 14px;background:var(--text);color:#fff;border-radius:var(--radius-sm);font-size:10px;font-weight:500;letter-spacing:0.04em;transition:all 0.4s ease}

/* RECAP LIST */
.recap-label{font-size:10px;font-weight:400;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-light);margin-bottom:8px}
.recap-list{display:flex;flex-direction:column}
.recap-item{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border);gap:10px}
.recap-item:last-child{border-bottom:none}
.recap-key{font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-light);flex-shrink:0;padding-top:1px}
.recap-val{font-size:11px;color:var(--text);text-align:right;font-weight:400;line-height:1.4}
.recap-empty{font-size:11px;color:#666666;text-align:right;font-style:italic;font-weight:400}

/* ═══════════════════ TABLET + MOBILE (≤860px) ═══════════════════ */
@media(max-width:860px){

  html,body{overflow:auto}
  #app{height:auto}

  /* TOPBAR: hidden on mobile */
  .topbar{display:none}

  /* LAYOUT: single column */
  .app-body{grid-template-columns:1fr;overflow:visible}

  /* STEP PANEL */
  .step-panel{height:auto;padding:28px 20px 68px;border-right:none;border-bottom:1px solid var(--border)}
  .step-title{font-size:23px}
  .step-desc{font-size:13px;margin-bottom:22px}

  .welcome-sub{font-size:16px}
  .welcome-body,.welcome-note{font-size:13px}
  .welcome-steps{padding:16px 18px;gap:8px}

  .nav-row{flex-direction:column;gap:8px}
  .btn-next{order:1;width:100%;justify-content:center}
  .btn-back{order:2;width:100%;justify-content:center}

  /* CHIPS */
  .chip{font-size:12px;padding:8px 14px}

  /* OPTION / BUSINESS TYPE GRID */
  .option-grid.two-col{grid-template-columns:1fr}

  /* PALETTE */
  .palette-grid{grid-template-columns:1fr 1fr}

  /* CANVAS PANEL: show preview card, hide recap */
  .canvas-panel{height:auto;border-top:1px solid var(--border)}
  .canvas-top{flex:none;height:auto;padding:16px 20px 20px}
  .canvas-section-label{display:none}
  .canvas-bottom{display:none}

  /* WELCOME SCREEN: title + sub + card + CTA only */
  .welcome-body,.welcome-note,.welcome-steps{display:none}

  /* SUMMARY: full-screen fixed overlay */
  .app-body.summary-mode .step-panel{
    position:fixed;inset:0;z-index:200;
    height:100vh;height:100dvh;
    padding:0;overflow:hidden;border:none;
  }

    align-items:flex-start;gap:10px;

  .se-label{font-size:8px;margin-bottom:3px}
  .se-voice{font-size:12px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .se-actions{width:100%;flex-wrap:wrap;gap:7px}
  .se-btn{flex:1;min-width:calc(50% - 4px);justify-content:center;padding:10px 12px;font-size:11px}
  .se-btn.ghost{flex:0 0 auto;font-size:11px}
  .copy-confirm{font-size:10px}

  /* HERO NAV (inside mockup) */
  .hero-nav{padding:12px 20px;flex-shrink:0}
  .hero-nav-links{display:none}

  /* HERO TEXT SCALING */
  .hero-headline{font-size:28px!important;line-height:1.05;margin-bottom:12px}
  .hero-body-copy{font-size:12px!important;line-height:1.6;margin-bottom:18px;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .hero-eyebrow{margin-bottom:10px}
  .hero-btn{padding:10px 18px;font-size:11px}
  .hero-btn-ghost{font-size:11px}
  .hero-cta-row{gap:12px;flex-wrap:wrap}

  /* ── FULL BLEED: tighten padding ── */
  .hero-fullbleed .hero-text{padding:18px 20px 22px}

  /* ── SPLIT: stack — image on top, text below ── */
  .hero-split{flex-direction:column-reverse;overflow-y:auto}
  .hero-split .hero-text{padding:16px 20px 18px;flex:none}
  .split-divider{display:none}
  .split-img-half{flex:0 0 160px;width:100%}

  /* ── POLAROID: text top, card below ── */
  .hero-polaroid{flex-direction:column;align-items:flex-start;overflow-y:auto}
  .hero-polaroid .hero-text{padding:16px 20px 10px;flex:none}
  .polaroid-wrap{padding:0 0 16px 20px;flex:none;justify-content:flex-start}
  .polaroid-card{width:150px;transform:rotate(-1.5deg)}

  /* ── FLOATING: collapse to stacked ── */
  .hero-floating{flex-direction:column;align-items:flex-start;overflow-y:auto}
  .hero-floating .hero-text{padding:16px 20px 10px;flex:none;position:static;z-index:auto}
  .floating-img{
    position:static;transform:none!important;
    width:calc(100% - 40px);margin:0 20px 16px;
    border-radius:8px;z-index:auto;
    box-shadow:0 10px 32px rgba(0,0,0,0.35);
  }
  .floating-img:hover{transform:none!important}

  /* ── FRAMED: stack ── */
  .hero-framed{flex-direction:column;align-items:flex-start;overflow-y:auto}
  .hero-framed .hero-text{padding:16px 20px 10px;flex:none}
  .framed-wrap{padding:0 0 16px 20px;flex:none}
  .framed-box img,.framed-box .frame-ph{width:min(240px,calc(100vw - 80px))}
}

/* ═══════════════════ SMALL PHONES (≤480px) ═══════════════════ */
@media(max-width:480px){
  .topbar-sub{display:none}
  .topbar-title{font-size:16px}
  .step-title{font-size:20px}

  .hero-headline{font-size:22px!important}

  .se-btn{min-width:calc(50% - 4px)}
}

@media print{

  .print-summary .split-img-half img,.print-summary .floating-img img,

}
.print-summary{display:none}

// ─── STATE ──────────────────────────────────────────────────────────
const STATE_KEY = 'tme_session';

const defaultState = () => ({
  currentStep: 0,
  selections: {
    businessType: null, brandName: '', brandPhoto: null, tone: [],
    typography: null, palette: null,
    customColors: {bg:'#F9F6F2', text:'#3A2E24', accent:'#8A7560'},
    layout: null, shape: null, border: null, motion: null,
    texture: null, animStyle: null, hardNos: [],
  }
});

function saveState() {
  try {
    sessionStorage.setItem(STATE_KEY, JSON.stringify(state));
  } catch(e) {
    // quota exceeded (large photo) — save without photo
    try {
      const slim = JSON.parse(JSON.stringify(state));
      slim.selections.brandPhoto = null;
      sessionStorage.setItem(STATE_KEY, JSON.stringify(slim));
    } catch(_) {}
  }
}

function loadState() {
  try {
    const saved = sessionStorage.getItem(STATE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      state.currentStep  = parsed.currentStep  ?? 0;
      state.selections   = Object.assign(defaultState().selections, parsed.selections || {});
    }
  } catch(_) {}
}

const state = defaultState();

// step index to key mapping
const STEP_KEYS = [null,'businessType',null,'tone','typography','palette','layout','shape','border','motion','texture','animStyle','hardNos',null,null];
const TOTAL_PREF_STEPS = 12; // steps 1-10

// ─── PROGRESS ───────────────────────────────────────────────────────
function updateProgress() {
  const s = state.currentStep;
  const labels = ['Welcome','Your business','Upload your brand','Emotional tone','Typography','Colour palette',
    'Layout & spacing','Shape & edge','Borders & lines','Motion','Texture & pattern',
    'Animation style','Hard no\'s','Review','Your profile'];

  document.getElementById('progress-label').textContent = labels[s] || '';

  const pct = s <= 0 ? 0 : s >= 14 ? 100 : Math.round((s / 14) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';

  // dots for steps 1-12
  let dotsHtml = '';
  for (let i = 1; i <= 12; i++) {
    const cls = i < s ? 'done' : i === s ? 'active' : '';
    dotsHtml += `<div class="pdot ${cls}"></div>`;
  }
  document.getElementById('progress-dots').innerHTML = dotsHtml;
}

// ─── RENDER STEP ────────────────────────────────────────────────────
function renderStep() {
  const panel = document.getElementById('step-panel');
  const body = document.querySelector('.app-body');
  body.classList.toggle('summary-mode', state.currentStep === 14);
  panel.classList.remove('step-animate');
  void panel.offsetWidth;
  panel.classList.add('step-animate');
  panel.scrollTop = 0;
  updateProgress();

  switch(state.currentStep) {
    case 0:  panel.innerHTML = renderWelcome(); break;
    case 1:  panel.innerHTML = renderBusinessType(); break;
    case 2:  panel.innerHTML = renderUpload(); setupUpload(); break;
    case 3:  panel.innerHTML = renderTone(); break;
    case 4:  panel.innerHTML = renderTypography(); break;
    case 5:  panel.innerHTML = renderPalette(); break;
    case 6:  panel.innerHTML = renderOptions('Layout & Spacing','How should your space feel?','Choose how your design breathes.',LAYOUT_OPTIONS,'layout',false); break;
    case 7:  panel.innerHTML = renderOptions('Shape & Edge','Sharp or soft?','This shapes everything from buttons to images to how sections meet.',SHAPE_OPTIONS,'shape',false); break;
    case 8:  panel.innerHTML = renderOptions('Borders & Lines','How visible is the structure?','Lines can anchor, divide, or disappear entirely.',BORDER_OPTIONS,'border',true); break;
    case 9:  panel.innerHTML = renderOptions('Motion & Interaction','How much should things move?','Even subtle motion carries a personality.',MOTION_OPTIONS,'motion',false); break;
    case 10: panel.innerHTML = renderOptions('Texture & Pattern','How layered should the surfaces be?','Texture can add depth, or you may want none at all.',TEXTURE_OPTIONS,'texture',false); break;
    case 11: panel.innerHTML = renderOptions('Animation Style','How should things move and reveal?','Choose what happens when the page loads and when the user interacts.',ANIM_OPTIONS,'animStyle',false); break;
    case 12: panel.innerHTML = renderHardNos(); break;
    case 13: panel.innerHTML = renderReview(); break;
    case 14: panel.innerHTML = renderSummary(); break;
  }
}

  const hasPhoto = !!state.selections.brandPhoto;
  return `

    <h2 class="step-title">Let's Start With What You Have</h2>
    <p class="step-desc">Upload a photo of your current brand, product, or something that captures where you are right now. It doesn't have to be perfect. It gives your preferences real context as we build your profile.</p>
    <div class="upload-zone" id="upload-zone">
      ${hasPhoto ? `<img src="${state.selections.brandPhoto}" id="upload-preview" />` : `
        <div id="upload-placeholder">
          <div class="upload-icon">+</div>
          <div class="upload-title">Drag and drop your image here</div>
          <div class="upload-hint">JPG, PNG, or WEBP · Or click to browse</div>
        </div>
        <img id="upload-preview" style="display:none" />`}
    </div>
    <input type="file" id="file-input" accept="image/*" style="display:none" />
    ${hasPhoto ? `<span class="upload-remove" id="upload-remove" style="display:block" onclick="removePhoto()">Remove photo</span>` : ''}
    <p class="upload-skip" onclick="goNext()">Skip for now →</p>
    <div class="nav-row" style="margin-top:28px">
      <button class="btn-back" onclick="goBack()">← Back</button>
      <button class="btn-next" onclick="goNext()">Next Step →</button>
    </div>`;
}

function setupUpload() {
  const zone = document.getElementById('upload-zone');
  const input = document.getElementById('file-input');
  if (!zone || !input) return;
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) handleFileUpload(file);
  });
  zone.addEventListener('click', () => input.click());
  input.addEventListener('change', e => { if (e.target.files[0]) handleFileUpload(e.target.files[0]); });
}

function handleFileUpload(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    state.selections.brandPhoto = e.target.result;
    saveState();
    const prev = document.getElementById('upload-preview');
    const ph = document.getElementById('upload-placeholder');
    if (prev) { prev.src = e.target.result; prev.style.display = 'block'; }
    if (ph) ph.style.display = 'none';
    let rem = document.getElementById('upload-remove');
    if (!rem) {
      rem = document.createElement('span');
      rem.id = 'upload-remove'; rem.className = 'upload-remove';
      rem.style.display = 'block'; rem.textContent = 'Remove photo';
      rem.onclick = removePhoto;
      document.getElementById('upload-zone').after(rem);
    } else { rem.style.display = 'block'; }
    renderCanvas();
  };
  reader.readAsDataURL(file);
}

function removePhoto() {
  state.selections.brandPhoto = null;
  saveState();
  renderStep();
  renderCanvas();
}

    <div class="chip-grid">
      ${TONE_OPTIONS.map(t => `
        <div class="chip ${sel.includes(t)?'selected':''} ${recTones.includes(t)?'rec':''}" onclick="toggleTone('${t}')">${t}</div>
      `).join('')}
    </div>

      <button class="btn-back" onclick="goBack()">← Back</button>
      <button class="btn-next" onclick="goNext()">Next Step →</button>

function toggleTone(word) {
  const arr = state.selections.tone;
  const i = arr.indexOf(word);
  if (i > -1) arr.splice(i, 1); else arr.push(word);
  document.querySelectorAll('.chip').forEach(el => {
    el.classList.toggle('selected', arr.includes(el.textContent));
  });
  saveState();
  renderCanvas();
}

function toggleHardNo(i) {
  const item = HARD_NO_OPTIONS[i];
  const arr = state.selections.hardNos;
  const idx = arr.indexOf(item);
  if (idx > -1) arr.splice(idx, 1); else arr.push(item);
  document.querySelectorAll('#step-panel .chip').forEach((el, j) => {
    el.classList.toggle('selected', arr.includes(HARD_NO_OPTIONS[j]));
  });
  saveState();
  renderCanvas();
}

function selectOption(key, value, el) {
  state.selections[key] = value;
  const parent = el.closest('.typo-grid, .palette-grid, .option-grid');
  if (parent) parent.querySelectorAll('.typo-card,.palette-card,.option-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  saveState();
  renderCanvas();
}

// ─── HERO LAYOUT SELECTOR ────────────────────────────────────────────
function getHeroLayout(s) {
  const tone = s.tone.map(t => t.toLowerCase());
  const has = (...words) => words.some(w => tone.includes(w));

  if (s.shape === 'sharp' && (s.border === 'editorial' || s.border === 'bold'))
    return 'framed';
  if (has('bold','moody','editorial','raw') || s.border === 'bold')
    return 'fullbleed';
  if (has('warm','approachable','rustic','playful','whimsical') || s.shape === 'soft')
    return 'polaroid';
  if (has('modern','crisp') || s.motion === 'expressive')
    return 'floating';
  return 'split';
}

// ─── HERO COPY GENERATOR ─────────────────────────────────────────────
function generateHeroCopy(tone) {
  const t = tone.map(w => w.toLowerCase());
  const has = w => t.includes(w);
  let headline = 'Your Brand, Defined.';
  let body = 'A brand built with purpose, designed to say exactly what it needs to, and nothing more.';
  let cta = 'See the Work';
  let eyebrow = 'Est. 2024';

  if (has('luxurious') || has('sophisticated')) {
    headline = 'Reserved for the Discerning.';
    body = 'Crafted for those who notice the difference. Every surface considered. Every detail earned.';
    cta = 'Discover More'; eyebrow = 'A Higher Standard';
  } else if (has('bold')) {
    headline = 'No Compromise.';
    body = 'No half measures. No hedging. Just the work, and the thinking behind it.';
    cta = 'See It All'; eyebrow = 'The Work';
  } else if (has('editorial')) {
    headline = 'The Work Speaks First.';
    body = 'A clear perspective. A considered point of view. Everything here is intentional, down to the last detail.';
    cta = 'Read More'; eyebrow = 'A Point of View';
  } else if (has('minimal') || has('calm')) {
    headline = 'Less. But Better.';
    body = 'The unnecessary has been removed. What remains is precisely what you need.';
    cta = 'Explore'; eyebrow = 'Simply';
  } else if (has('refined')) {
    headline = 'Crafted With Intention.';
    body = 'Every decision has a reason. Every element, its place. This is what considered work looks like.';
    cta = 'View the Work'; eyebrow = 'The Studio';
  } else if (has('warm') || has('approachable')) {
    headline = 'Made for the Long Run.';
    body = 'Built around the things that matter. Real work, real people, real results.';
    cta = 'Get in Touch'; eyebrow = 'Welcome';
  } else if (has('timeless')) {
    headline = 'Made to Last.';
    body = 'Beyond the trend. Beyond the moment. Built for now and for what comes next.';
    cta = 'Learn More'; eyebrow = 'Enduring';
  } else if (has('modern')) {
    headline = 'What\'s Next.';
    body = 'Forward-facing without apology. Built for right now, ready for what follows.';
    cta = 'Explore Now'; eyebrow = 'Current';
  } else if (has('moody') || has('romantic')) {
    headline = 'Something Worth Feeling.';
    body = 'The kind of brand that stays with you. Atmosphere, considered. Mood, intentional.';
    cta = 'Explore'; eyebrow = 'The Experience';
  }
  return { headline, body, cta, eyebrow };
}

// ─── SUMMARY ─────────────────────────────────────────────────────────
function renderSummary() {
  const s = state.selections;
  const typo = TYPOGRAPHY_OPTIONS.find(t => t.id === s.typography);
  const pal  = PALETTE_OPTIONS.find(p => p.id === s.palette);
  const layout  = LAYOUT_OPTIONS.find(l => l.id === s.layout);
  const shape   = SHAPE_OPTIONS.find(sh => sh.id === s.shape);
  const border  = BORDER_OPTIONS.find(b => b.id === s.border);
  const motion  = MOTION_OPTIONS.find(m => m.id === s.motion);
  const texture = TEXTURE_OPTIONS.find(t => t.id === s.texture);
  const voice   = generateVoice(s, typo, pal, layout, shape);

  const copy     = generateHeroCopy(s.tone);
  const heroLayout = getHeroLayout(s);

  // Shared style object
  const bg         = s.palette === 'custom' ? s.customColors.bg   : (pal ? pal.canvasBg    : '#FAFAF8');
  const textCol    = s.palette === 'custom' ? s.customColors.text : (pal ? pal.canvasText  : '#1A1A1A');
  const accent     = s.palette === 'custom' ? s.customColors.accent : (pal ? pal.canvasAccent : '#1A1A1A');
  const accentText = isLight(accent) ? '#1A1A1A' : '#FFFFFF';
  const radius     = shape?.id === 'sharp' ? '0' : shape?.id === 'soft' ? '40px' : '6px';
  const cardRadius = shape?.id === 'sharp' ? '0' : shape?.id === 'soft' ? '20px' : '10px';
  const heroPad    = layout?.id === 'spacious' ? '0 72px 52px' : layout?.id === 'dense' ? '0 40px 28px' : '0 56px 40px';
  const headSize   = layout?.id === 'spacious' ? '62px' : layout?.id === 'dense' ? '42px' : '52px';
  const navPad     = layout?.id === 'spacious' ? '24px 72px' : layout?.id === 'dense' ? '14px 40px' : '20px 56px';
  const navBorder  = border?.id === 'minimal' ? 'none' : border?.id === 'structured' ? `1px solid ${textCol}22` : border?.id === 'editorial' ? `1.5px solid ${textCol}55` : border?.id === 'bold' ? `2.5px solid ${textCol}` : 'none';
  const btnBorder  = border?.id === 'bold' ? `2px solid ${accent}` : 'none';
  const headFont   = typo ? typo.headFont  : "'Cormorant Garamond', serif";
  const headWt     = typo ? typo.headWeight : '400';
  const bodyFont   = typo ? typo.bodyFont  : "'DM Sans', sans-serif";
  const bodyWt     = typo ? typo.bodyWeight : '300';
  const textureCss = texture?.id === 'subtle'  ? `background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E")`
                   : texture?.id === 'layered' ? `background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E")` : '';

  const st = { bg, textCol, accent, accentText, radius, cardRadius, heroPad, headSize,
               navPad, navBorder, btnBorder, headFont, headWt, bodyFont, bodyWt, textureCss, copy };

  const heroSection = buildHeroSection(heroLayout, s, st);

function generateVoice(s, typo, pal, layout, shape, colorTag = null) {
  const fmtColor = colorTag
    ? (hex, role, name) => colorTag(hex, role, name)
    : (hex, role, name) => name ? `${role} ${name} (${hex})` : role ? `${role} (${hex})` : hex;
  const getName = (hex) => {
    if (s.palette === 'custom' || !pal) return '';
    if (hex === pal.canvasBg)     return pal.bgName     || '';
    if (hex === pal.canvasText)   return pal.textName   || '';
    if (hex === pal.canvasAccent) return pal.accentName || '';
    return '';
  };
  const biz = BUSINESS_TYPES.find(b => b.id === s.businessType);
  const toneMap = {
    'warm':          'comfortable and easy to trust',
    'approachable':  'welcoming without being casual',
    'refined':       'polished without trying too hard',
    'sophisticated': 'quietly confident',
    'bold':          'direct and hard to ignore',
    'moody':         'atmospheric and memorable',
    'editorial':     'considered and intentional',
    'minimal':       'clean and uncluttered',
    'modern':        'current and no-nonsense',
    'playful':       'energetic and personable',
    'rustic':        'grounded and honest',
    'whimsical':     'expressive and full of character',
    'raw':           'unfiltered and genuine',
    'timeless':      'enduring, not trend-driven',
    'calm':          'steady and reassuring',
    'crisp':         'sharp and decisive',
    'romantic':      'emotive and considered',
  };

  const tones = s.tone.map(t => t.toLowerCase());
  const outcomes = tones.slice(0, 2).map(t => toneMap[t]).filter(Boolean);
  const bg_v     = s.palette === 'custom' ? s.customColors.bg     : pal?.canvasBg;
  const textC_v  = s.palette === 'custom' ? s.customColors.text   : pal?.canvasText;
  const accent_v = s.palette === 'custom' ? s.customColors.accent : pal?.canvasAccent;

  let sentences = [];

  if (outcomes.length >= 2) {
    sentences.push(`Your brand should feel ${outcomes[0]} and ${outcomes[1]}, and visitors should sense that within the first few seconds of landing.`);
  } else if (outcomes.length === 1) {
    sentences.push(`Your brand should feel ${outcomes[0]}, and visitors should sense that within the first few seconds of landing.`);
  } else if (s.tone.length) {
    sentences.push(`Your brand carries a ${s.tone.slice(0,2).join(', ').toLowerCase()} quality that should come through immediately on the page.`);
  }

  if (typo) {
    sentences.push(`The fonts are legible at any size. Headings make it immediately clear where attention belongs, and body copy should never make someone work to read it.`);
  }

  if (layout?.id === 'spacious') {
    sentences.push(`Give each section room to breathe. One strong image per section is more effective than several competing ones. Do not overcrowd with text.`);
  } else if (layout?.id === 'dense') {
    sentences.push(`This layout handles content well. Keep groupings tight and intentional so density reads as editorial, not cluttered.`);
  } else if (layout?.id === 'balanced') {
    sentences.push(`Follow the grid. Consistent spacing and alignment is what makes this feel considered rather than assembled.`);
  }

  if (biz?.id === 'service' || biz?.id === 'personal') {
    sentences.push(`This site is stylistically suited for a professional, not a product. Resist anything that makes it feel like a shop or a pitch.`);
  } else if (biz?.id === 'product') {
    sentences.push(`This design supports discovery and decision-making. Every element should help someone decide, not just admire.`);
  } else if (biz?.id === 'creative') {
    sentences.push(`This is a portfolio and a first impression at once. The work should be prominent and the noise minimal.`);
  } else if (biz?.id === 'hospitality') {
    sentences.push(`Atmosphere is the first thing people buy. The design should make someone feel like they are already there.`);
  } else if (biz?.id === 'wellness') {
    sentences.push(`Trust is the first conversion. Nothing should feel pushy or sales-forward.`);
  }

  if (accent_v && bg_v && textC_v) {
    sentences.push(`Use ${fmtColor(accent_v, 'your accent color', getName(accent_v))} only for calls to action, links, and important callouts. Everything else stays in ${fmtColor(bg_v, 'your background', getName(bg_v))} and your text color, ${fmtColor(textC_v, '', getName(textC_v))}.`);
  }

  if (!sentences.length) return 'Complete all steps to generate your design voice.';
  return sentences.join(' ');
}

function copyPrompt() {

    texture ? `TEXTURE\n${texture.name}: ${texture.desc}` : '',
    anim ? `ANIMATION STYLE\n${anim.name}: ${anim.desc}` : '',
    s.hardNos.length ? `HARD NO'S\n${s.hardNos.join(', ')}` : '',

  if (s.brandPhoto) {
    if (!existingImg) {
      existingImg = document.createElement('img');
      photoEl.appendChild(existingImg);
    }
    existingImg.src = s.brandPhoto;
    existingImg.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover';
    if (ph) ph.style.display = 'none';
  } else {
    if (existingImg) existingImg.remove();
    if (ph) ph.style.display = '';
  }

  // Brand name
  if (headEl && s.brandName) {
    headEl.textContent = s.brandName;
  } else if (headEl && !s.brandName) {
    headEl.textContent = 'Your Brand, Defined';
  }

  // Tone tags
  if (tagsEl) {
    if (s.tone.length) {
      const shown = s.tone.slice(0, 4);
      const extra = s.tone.length > 4 ? `<div class="ctag">+${s.tone.length - 4}</div>` : '';
      tagsEl.innerHTML = shown.map(t => `<div class="ctag on">${t}</div>`).join('') + extra;
    } else {
      tagsEl.innerHTML = '<div class="ctag">+ tone</div>';
    }
  }

  // Typography
  if (s.typography) {
    const typo = TYPOGRAPHY_OPTIONS.find(t => t.id === s.typography);
    if (typo && headEl && tagEl) {
      headEl.style.fontFamily = typo.headFont;
      headEl.style.fontWeight = typo.headWeight;
      tagEl.style.fontFamily = typo.bodyFont;
      tagEl.style.fontWeight = typo.bodyWeight;
    }
  }

  // Palette
  if (s.palette && stripEl) {
    let palBg, palText, palAccent, palColors;
    if (s.palette === 'custom') {
      palBg = s.customColors.bg; palText = s.customColors.text; palAccent = s.customColors.accent;
      palColors = [palBg, palText, palAccent];
    } else {
      const pal = PALETTE_OPTIONS.find(p => p.id === s.palette);
      if (!pal) return;
      palBg = pal.canvasBg; palText = pal.canvasText; palAccent = pal.canvasAccent; palColors = pal.colors;
    }
    stripEl.innerHTML = palColors.map(c => `<div class="cps" style="background:${c}"></div>`).join('');
    if (bodyEl) bodyEl.style.background = palBg;
    if (headEl) headEl.style.color = palText;
    if (tagEl) tagEl.style.color = palText + 'AA';
    if (ctaEl) { ctaEl.style.background = palAccent; ctaEl.style.color = isLight(palAccent) ? '#1A1A1A' : '#FFFFFF'; }
    if (photoEl) photoEl.style.background = palBg;
  }

  // Shape
  if (s.shape === 'sharp') {
    card.style.borderRadius = '0'; if(ctaEl) ctaEl.style.borderRadius = '0';
  } else if (s.shape === 'soft') {
    card.style.borderRadius = '20px'; if(ctaEl) ctaEl.style.borderRadius = '20px';
  } else if (s.shape) {
    card.style.borderRadius = '12px'; if(ctaEl) ctaEl.style.borderRadius = '6px';
  }

  // Border
  if (s.border === 'minimal') { card.style.border = 'none'; card.style.boxShadow = '0 2px 16px rgba(0,0,0,0.08)'; }
  else if (s.border === 'structured') { card.style.border = '1px solid #E8E4DC'; card.style.boxShadow = 'none'; }
  else if (s.border === 'editorial') { card.style.border = '1.5px solid #1A1A1A'; card.style.boxShadow = 'none'; }
  else if (s.border === 'bold') { card.style.border = '3px solid #1A1A1A'; card.style.boxShadow = 'none'; }

  // Layout: padding inside canvas body
  if (s.layout === 'spacious' && bodyEl) bodyEl.style.padding = '26px';
  else if (s.layout === 'dense' && bodyEl) bodyEl.style.padding = '12px';
  else if (bodyEl) bodyEl.style.padding = '18px';

  renderRecap();
}

function isLight(hex) {
  if (!hex || hex.length < 7) return true;
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (r*299+g*587+b*114)/1000 > 155;
}

// ─── RECAP ───────────────────────────────────────────────────────────
function renderRecap() {
  const s = state.selections;
  const typo = TYPOGRAPHY_OPTIONS.find(t => t.id === s.typography);
  const pal = PALETTE_OPTIONS.find(p => p.id === s.palette);
  const layout = LAYOUT_OPTIONS.find(l => l.id === s.layout);
  const shape = SHAPE_OPTIONS.find(sh => sh.id === s.shape);
  const border = BORDER_OPTIONS.find(b => b.id === s.border);
  const motion = MOTION_OPTIONS.find(m => m.id === s.motion);
  const texture = TEXTURE_OPTIONS.find(t => t.id === s.texture);

  const items = [
    {key:'Tone', val: s.tone.length ? s.tone.join(', ') : null},
    {key:'Typography', val: typo?.name || null},
    {key:'Palette', val: pal?.name || null},
    {key:'Layout', val: layout?.name || null},
    {key:'Shape', val: shape?.name || null},
    {key:'Borders', val: border?.name || null},
    {key:'Motion', val: motion?.name || null},
    {key:'Texture', val: texture?.name || null},
    {key:"Hard No's", val: s.hardNos.length ? s.hardNos.join(', ') : null},
  ];

  const el = document.getElementById('recap-list');
  if (!el) return;
  el.innerHTML = items.map(item => `
    <div class="recap-item">
      <div class="recap-key">${item.key}</div>
      ${item.val ? `<div class="recap-val">${item.val}</div>` : `<div class="recap-empty">Not yet chosen</div>`}
    </div>`).join('');
}

// ─── START OVER ──────────────────────────────────────────────────────
function startOver() {
  sessionStorage.removeItem(STATE_KEY);
  state.currentStep = 0;
  state.selections = {businessType:null,brandName:'',brandPhoto:null,tone:[],typography:null,palette:null,customColors:{bg:'#F9F6F2',text:'#3A2E24',accent:'#8A7560'},layout:null,shape:null,border:null,motion:null,texture:null,animStyle:null,hardNos:[]};
  // reset canvas inline styles
  const card = document.getElementById('canvas-card');
  const body = document.getElementById('canvas-body');
  const head = document.getElementById('canvas-headline');
  const tag = document.getElementById('canvas-tagline');
  const cta = document.getElementById('canvas-cta');
  const photo = document.getElementById('canvas-photo');
  if(card){card.style.borderRadius='';card.style.border='';card.style.boxShadow='';}
  if(body){body.style.background='';body.style.padding='';}
  if(head){head.style.fontFamily='';head.style.fontWeight='';head.style.color='';}
  if(tag){tag.style.fontFamily='';tag.style.fontWeight='';tag.style.color='';}
  if(cta){cta.style.background='';cta.style.color='';cta.style.borderRadius='';}
  if(photo){photo.style.background='';const img=photo.querySelector('img');if(img)img.remove();}
  renderStep();
  renderCanvas();
}

// ─── NAVIGATION ──────────────────────────────────────────────────────
function goNext() {
  if (state.currentStep < 14) { state.currentStep++; saveState(); renderStep(); }
}
function goBack() {
  if (state.currentStep > 0) { state.currentStep--; saveState(); renderStep(); }
}
function jumpTo(step) {
  state.currentStep = step; saveState(); renderStep();
}

// ─── INIT ────────────────────────────────────────────────────────────
loadState();
renderStep();
renderCanvas();
</script>
